# Pi-hole CPU Temperature Display Configuration
#
# Temperatures are in Celsius.
#
# Defaults:
#   Green  = below WARN_C
#   Yellow = WARN_C through below CRIT_C
#   Red    = CRIT_C and above
#
# Raspberry Pi systems usually throttle around 80C, so these defaults are
# intentionally conservative dashboard warning levels, not panic levels.

WARN_C=60
CRIT_C=70

# TEMP_FILE controls which Linux thermal sensor is used.
#
# Recommended:
#   TEMP_FILE=auto
#
# This will scan /sys/class/thermal/thermal_zone*/type and prefer CPU/SoC
# style sensors where possible.
#
# Advanced override example:
#   TEMP_FILE=/sys/class/thermal/thermal_zone0/temp

TEMP_FILE=auto
